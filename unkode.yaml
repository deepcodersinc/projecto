architecture:
  - name: Web Client
    path: app
    kind: frontend
    tech: [TypeScript, React, MobX, Vite, Styled Components]
    role: Single-page web application that users interact with to read, write, and collaborate on documents.
    depends_on:
      - API Server
      - Realtime Gateway
      - Collaboration Server
      - Shared Library
      - Sentry
    components:
      - name: Scenes
        path: app/scenes
        description: Full-page views composed of many components (documents, settings, search, login, etc.).
      - name: UI Components
        path: app/components
        description: Reusable React components and design primitives shared across scenes.
      - name: Stores
        path: app/stores
        description: MobX stores that fetch, cache, and mutate domain models against the backend API.
      - name: Models
        path: app/models
        description: MobX observable domain models (documents, collections, users, comments, etc.).
      - name: Routes
        path: app/routes
        description: Async-loaded route definitions wiring scenes into the SPA.
      - name: Editor Bindings
        path: app/editor
        description: React glue around the shared ProseMirror editor for document editing.
      - name: Actions and Menus
        path: app/actions
        description: Reusable user actions and context menus driving the command palette and UI affordances.

  - name: API Server
    path: server
    kind: backend
    tech: [TypeScript, Node.js, Koa, Sequelize]
    role: HTTP API service that authenticates users and exposes CRUD endpoints for every resource in Outline.
    depends_on:
      - PostgreSQL
      - Redis
      - Object Storage
      - Shared Library
      - Async Worker
      - Plugins
      - Sentry
      - Datadog
    components:
      - name: API Routes
        path: server/routes/api
        description: REST-style endpoints for documents, collections, users, integrations, and other resources.
      - name: Auth Routes
        path: server/routes/auth
        description: OAuth, SAML, OIDC, and email authentication entrypoints handled via Passport strategies.
      - name: OAuth Server
        path: server/routes/oauth
        description: OAuth 2.0 authorization server endpoints for third-party API clients.
      - name: MCP Server
        path: server/routes/mcp
        description: Model Context Protocol endpoint exposing Outline content to AI tools.
      - name: Models
        path: server/models
        description: Sequelize-typescript models defining the persistent domain schema.
      - name: Migrations
        path: server/migrations
        description: Sequelize migration files for evolving the PostgreSQL schema.
      - name: Commands
        path: server/commands
        description: Higher-level orchestrations that mutate multiple models within a single transaction.
      - name: Policies
        path: server/policies
        description: cancan-based authorization rules that gate every resource action.
      - name: Presenters
        path: server/presenters
        description: Serializers that turn Sequelize models into the JSON shapes consumed by the client.
      - name: Middlewares
        path: server/middlewares
        description: Shared Koa middleware for auth, rate limiting, validation, and request context.
      - name: Emails
        path: server/emails
        description: React-based transactional email templates rendered for notifications and invites.
      - name: Server Editor Helpers
        path: server/editor
        description: Server-side helpers for parsing and rewriting ProseMirror documents.

  - name: Realtime Gateway
    path: server/services/websockets.ts
    kind: backend
    tech: [TypeScript, Socket.IO, Redis]
    role: Socket.IO gateway that pushes document, presence, and notification events to connected clients.
    depends_on:
      - Redis
      - PostgreSQL
      - Shared Library

  - name: Collaboration Server
    path: server/collaboration
    kind: backend
    tech: [TypeScript, Hocuspocus, Yjs]
    role: Hocuspocus server providing real-time collaborative editing of ProseMirror documents over Yjs.
    depends_on:
      - PostgreSQL
      - Redis
      - Shared Library
      - API Server

  - name: Async Worker
    path: server/queues
    kind: worker
    tech: [TypeScript, Bull, Redis]
    role: Background worker that runs Bull queue tasks and event processors triggered by API actions.
    depends_on:
      - Redis
      - PostgreSQL
      - Object Storage
      - SMTP
      - Shared Library
      - Plugins
    components:
      - name: Event Processors
        path: server/queues/processors
        description: Handlers reacting to domain events (notifications, search indexing, backlinks, exports).
      - name: Async Tasks
        path: server/queues/tasks
        description: Standalone jobs for imports, exports, cleanups, notifications, and avatar processing.
      - name: Queue Health Monitor
        path: server/queues/HealthMonitor.ts
        description: Watches Bull queues and surfaces stalled or failing jobs.

  - name: Cron Service
    path: server/services/cron.ts
    kind: worker
    tech: [TypeScript]
    role: Schedules recurring maintenance jobs such as cleanups and reminder emails onto the worker queues.
    depends_on:
      - Async Worker
      - Redis

  - name: Admin Service
    path: server/services/admin.ts
    kind: backend
    tech: [TypeScript, Bull Board]
    role: Internal admin UI exposing Bull queue dashboards and operational tooling.
    depends_on:
      - Redis
      - Async Worker

  - name: Plugins
    path: plugins
    kind: library
    tech: [TypeScript, React]
    role: Modular integrations bundled with Outline that extend auth, storage, search, and third-party services.
    depends_on:
      - API Server
      - Shared Library
    components:
      - name: Auth Providers
        path: plugins
        description: SSO and identity plugins (azure, google, oidc, slack, passkeys).
      - name: Third-Party Integrations
        path: plugins
        description: Service integrations (notion, github, gitlab, linear, jira, figma, discord, zapier, webhooks).
      - name: Embed Providers
        path: plugins/iframely
        description: Iframely-based unfurling and rich embeds for external URLs.
      - name: Storage Backends
        path: plugins/storage
        description: Pluggable file storage drivers including local disk and S3-compatible providers.
      - name: Search Backends
        path: plugins/search-postgres
        description: PostgreSQL-backed full-text search implementation.
      - name: Email Plugin
        path: plugins/email
        description: Inbound email handling for creating documents from messages.
      - name: Analytics Plugins
        path: plugins
        description: Frontend analytics adapters (googleanalytics, matomo).
      - name: Diagrams Plugin
        path: plugins/diagrams
        description: Renders Mermaid and other diagram syntaxes inside documents.
      - name: Enterprise Plugin
        path: plugins/enterprise
        description: Features reserved for the enterprise distribution of Outline.

  - name: CLI Tools
    path: cli
    kind: cli
    tech: [TypeScript, Node.js, Commander]
    role: Command-line utilities for administering an Outline instance (document import/export).
    depends_on:
      - API Server
      - Shared Library
    components:
      - name: CLI Commands
        path: cli/commands
        description: Individual subcommands such as document export and import.

  - name: Shared Library
    path: shared
    kind: library
    tech: [TypeScript, React, ProseMirror]
    role: Code shared between client and server, including the ProseMirror editor, schemas, and helpers.
    depends_on: []
    components:
      - name: ProseMirror Editor
        path: shared/editor
        description: The collaborative document editor used by both client and server-side rendering.
      - name: Shared Components
        path: shared/components
        description: React components reused across the frontend and email rendering.
      - name: i18n
        path: shared/i18n
        description: i18next setup and locale catalogs for translated UI text.
      - name: Helpers and Utils
        path: shared/utils
        description: Pure utility functions (text, urls, dates) safe to use on both runtimes.
      - name: Schemas and Validations
        path: shared/validations.ts
        description: Shared validation rules and zod schemas enforced on both ends of the API.

  - name: PostgreSQL
    type: external
    kind: database
    role: Primary relational store for documents, users, teams, permissions, and all persistent state.

  - name: Redis
    type: external
    kind: cache
    role: Cache, pub/sub bus, Bull queue backend, rate limiter store, and Hocuspocus coordination layer.

  - name: Object Storage
    type: external
    kind: storage
    role: S3-compatible storage for user uploads, attachments, exports, and avatars.

  - name: SMTP
    type: external
    kind: api
    role: Outbound email delivery for notifications, invites, and authentication emails via Nodemailer.

  - name: OAuth Identity Providers
    type: external
    kind: api
    role: Third-party identity providers (Google, Slack, Azure AD, GitHub, OIDC) used for user sign-in.

  - name: Integration APIs
    type: external
    kind: api
    role: Third-party SaaS APIs (Notion, GitHub, GitLab, Linear, Figma, Discord, Zapier) integrated as content sources or webhooks.

  - name: Sentry
    type: external
    kind: api
    role: Error reporting for unhandled exceptions on both client and server.

  - name: Datadog
    type: external
    kind: api
    role: APM tracing and metrics collection via dd-trace and hot-shots StatsD.

deployment:
  - name: Web Dyno
    tech: [Heroku, Procfile]
    role: Runs the API server, websockets gateway, and collaboration server as the public-facing process.
    hosts:
      - API Server
      - Realtime Gateway
      - Collaboration Server

  - name: Worker Dyno
    tech: [Heroku, Procfile]
    role: Runs the async queue worker process for background jobs and scheduled tasks.
    hosts:
      - Async Worker
      - Cron Service

  - name: Outline Container
    tech: [Docker]
    role: Production container image bundling the built server, plugins, and frontend assets.
    hosts:
      - API Server
      - Realtime Gateway
      - Collaboration Server
      - Async Worker
      - Cron Service
      - Admin Service
      - Web Client

  - name: Postgres Container
    tech: [Docker Compose, postgres]
    role: Local development PostgreSQL instance defined in docker-compose.yml.
    hosts:
      - PostgreSQL

  - name: Redis Container
    tech: [Docker Compose, redis]
    role: Local development Redis instance defined in docker-compose.yml.
    hosts:
      - Redis
